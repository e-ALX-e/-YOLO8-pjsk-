plugins {
    id "com.android.application"
}

android {
    namespace "com.pjsk.autoplayer"
    compileSdk 36

    def enableNative = providers.gradleProperty("enableNative").orElse("false").get().toBoolean()
    if (enableNative) {
        ndkVersion "30.0.14904198"
    }

    defaultConfig {
        applicationId "com.pjsk.autoplayer"
        minSdk 29
        targetSdk 36
        versionCode 1
        versionName "0.1.0"

        if (enableNative) {
            externalNativeBuild {
                cmake {
                    cppFlags "-std=c++17 -O3"
                    arguments "-DANDROID_STL=c++_static"
                    abiFilters "arm64-v8a"
                }
            }

            ndk {
                abiFilters "arm64-v8a"
            }
        }
    }

    if (enableNative) {
        externalNativeBuild {
            cmake {
                path "src/main/cpp/CMakeLists.txt"
            }
        }
    }
}
